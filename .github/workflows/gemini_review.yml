name: Gemini PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Gemini Code Review
        # Đây là Action cực kỳ ổn định, không bao giờ lỗi "Repository not found"
        uses: coderabbitai/ai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          debug: false
          # Bạn có thể yêu cầu review bằng tiếng Việt ở đây
          system_message: |
            Bạn là một chuyên gia Senior Developer. 
            Hãy review các thay đổi trong PR này bằng tiếng Việt. 
            Tập trung vào lỗi logic và bảo mật.
