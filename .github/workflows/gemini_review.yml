name: Gemini PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Gemini Code Review
        # Thay đổi dòng này thành bản chuẩn của cộng đồng:
        uses: harper-reilly/gemini-review-action@v1.0.3 
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-1.5-flash"
          instructions: "Review code bằng tiếng Việt. Tập trung vào lỗi logic và bảo mật."
