name: Gemini PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Code Review
        uses: google-gemini/gemini-github-action@v1
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          model: 'gemini-1.5-flash'
          system_instruction: |
            Bạn là một Senior Full-stack Developer chuyên nghiệp.
            Hãy review các thay đổi trong Pull Request này.
            Yêu cầu:
            1. Ngôn ngữ: Tiếng Việt.
            2. Tập trung vào: Lỗi logic, bảo mật, và khả năng bảo trì code.
            3. Nếu code tốt, hãy đưa ra lời khen ngắn gọn.
            4. Nếu có lỗi, hãy giải thích lý do và gợi ý cách sửa.
