name: Gemini PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Gemini Code Review
        # Sử dụng Action này thay vì cái cũ bị lỗi
        uses: harper-reilly/gemini-review-action@v1.0.3 
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-1.5-flash"
          instructions: |
            Bạn là một Senior Developer. 
            Hãy review code trong Pull Request này bằng tiếng Việt.
            Tập trung vào lỗi logic, bảo mật và hiệu năng.
