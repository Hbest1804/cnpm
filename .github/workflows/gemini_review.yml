name: Gemini Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gemini Review
        # Dùng bản này để không bị lỗi "repository not found" nữa
        uses: stwise/gemini-review-action@v0.1.2
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-1.5-flash"
          instructions: "Hãy review code bằng tiếng Việt. Tập trung vào lỗi logic và bảo mật."
          
