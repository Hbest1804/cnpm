name: Gemini PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Gemini Code Review
        uses: harper-reilly/gemini-review-action@v1.0.3 # Đây là bản chuẩn
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-1.5-flash"
          # Tùy chọn hướng dẫn review bằng tiếng Việt
          instructions: |
            Review code bằng tiếng Việt. 
            Tập trung vào logic, bảo mật và hiệu năng.
            Khen ngợi nếu code tốt và góp ý chân thành nếu có lỗi.
